spring:
  application:
    name: aiproject

  config:
    import: "optional:file:.env"

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smart_ai_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret-key: ${JWT_SECRET_KEY:lAuL52tskmXNpe9fdOyf1V7rZRuPbn2KNZbU7ebp8sHQWbPngw1U34/LZnDJ1NQKxKBmJ/21RfVaJYiwC6bubQ==}
  expiration: 7D
  issuer: aiProject